<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greybrion Studio</title>
  <meta name="description" id="metaDescription"
    content="Greybrion Studioは、Unity向け開発ツール、AI開発支援ツール、オリジナルゲームを開発する個人開発スタジオです。『Manual Grid Authoring Tool』を公開中。">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-logo" id="site-title">Greybrion</div>

    <nav class="nav" id="siteNav">
      <div class="nav-item has-dropdown">
        <button class="nav-link dropdown-toggle" type="button" id="navWorks">Works</button>
        <div class="dropdown-menu">
          <a href="#works" id="navGames">Games</a>
          <a href="#works" id="navTools">Tools</a>
        </div>
      </div>

      <div class="nav-item">
        <a class="nav-link" href="devlog/index.html" id="navDevlog">Dev Log</a>
      </div>

      <div class="nav-item has-dropdown">
        <button class="nav-link dropdown-toggle" type="button" id="navStudio">Studio</button>
        <div class="dropdown-menu">
          <a href="#about" id="navAbout">About</a>
          <a href="#philosophy" id="navPhilosophy">Philosophy</a>
          <a href="#profile" id="navProfile">Profile</a>
        </div>
      </div>

      <div class="nav-item has-dropdown">
        <button class="nav-link dropdown-toggle" type="button" id="navContact">Contact</button>
        <div class="dropdown-menu">
          <a href="#contact" id="navContactLink">Contact</a>
          <li id="navBlueskyItem" hidden>
            <a id="navBlueskyLink" href="" target="_blank" rel="noopener noreferrer">
              <span id="navBluesky">Bluesky</span>
            </a>
          </li>
        </div>
      </div>

      <div class="nav-item has-dropdown">
        <button class="nav-link dropdown-toggle" type="button" id="navLanguage">Language</button>
        <div class="dropdown-menu">
          <button type="button" class="lang-option" data-lang="ja">日本語</button>
          <button type="button" class="lang-option" data-lang="en">English</button>
        </div>
      </div>
    </nav>

    <button
      class="menu-toggle"
      id="menuToggle"
      aria-label="メニューを開く"
      aria-expanded="false"
      aria-controls="siteNav"
      type="button"
    >
      ☰
    </button>
  </header>

  <main class="hero-layout">
    <section class="released" id="works">
      <h2 id="released-heading">RELEASED WORKS</h2>

      <div class="slider is-empty" id="worksSlider">
        <button class="slider-btn prev" id="prevBtn" aria-label="前へ" type="button">‹</button>

        <div class="slider-window" id="sliderWindow">
          <div class="slider-track is-empty" id="sliderTrack">
            <article class="slide-card coming-soon-card">
              <div class="coming-soon-image">COMING SOON</div>
              <div class="slide-body">
                <span class="slide-type">Soon</span>
                <a href="javascript:void(0)">Stay Tuned</a>
              </div>
            </article>
          </div>
        </div>

        <button class="slider-btn next" id="nextBtn" aria-label="次へ" type="button">›</button>
      </div>
    </section>

    <section class="guild-board" id="about">
      <div class="paper">
        <div class="paper-inner">
          <h1 id="paper-title">Greybrion Studio</h1>

          <p class="sub" id="paper-sub">
          </p>

          <div id="paper-body">
          </div>
        </div>

        <div class="seal" aria-hidden="true"></div>
      </div>
    </section>

    <section class="contact-section" id="philosophy">
      <h2 id="philosophy-heading">PHILOSOPHY</h2>
      <p id="philosophy-body">
      </p>
    </section>

    <section class="contact-section" id="profile">
      <h2 id="profile-heading">PROFILE</h2>
      <p id="profile-body">
      </p>
    </section>

    <section class="contact-section" id="contact">
      <h2 id="contact-heading">CONTACT</h2>
      <p id="contact-body">
      </p>
    </section>
  </main>

  <script src="js/language.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
